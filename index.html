<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SpotHole AI | Professional Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>
</head>
<body>

<header class="topbar">
    <div class="logo">SpotHole <span>AI</span></div>
    <div class="status-indicator">
        <span id="system-status">System: Ready</span>
        <div class="dot"></div>
    </div>
</header>

<div class="layout">
    <div id="map"></div>

    <aside class="sidebar">
        <div class="glass-card">
            <h3>Navigation Setup</h3>
            <div class="search-container">
                <input type="text" id="originInput" placeholder="Enter Origin" autocomplete="off">
                <div id="originSuggestions" class="suggestions-box"></div>
                <div class="btn-group">
                    <button class="btn-primary" onclick="setOriginManual()">Set Origin</button>
                    <button class="btn-secondary" onclick="useMyLocation()">My Location</button>
                </div>
            </div>

            <div class="search-container">
                <input type="text" id="destinationInput" placeholder="Enter Destination" autocomplete="off">
                <div id="destinationSuggestions" class="suggestions-box"></div>
                <button class="btn-primary full-width" onclick="setDestinationManual()">Set Destination</button>
            </div>
            <button class="btn-action" onclick="drawRoute()">Generate Smart Route</button>
        </div>

        <div class="glass-card">
            <h3>AI Vision Feed</h3>
            <div class="video-container">
                <div class="scanner-line"></div>
                <video id="camera" autoplay playsinline></video>
            </div>
            <button class="btn-monitor" id="monitorBtn" onclick="startCamera()">Start AI Monitoring</button>
        </div>

        <div class="glass-card detection-status">
            <h3>Live Detection</h3>
            <div class="status-row">
                <span>Current Surface:</span>
                <span id="currentSurface" class="status-value">Waiting...</span>
            </div>
            <div class="status-row">
                <span>Confidence:</span>
                <span id="confidenceValue" class="status-value">0%</span>
            </div>
        </div>

        <div class="glass-card analytics">
            <h3>Analytics & Risk</h3>
            <div class="metric"><span>Potholes Found</span><span id="potholeHits" class="neon-text">0</span></div>
            
            <div class="metric"><span>Road Risk Score</span><span id="riskScore">0%</span></div>
            <div class="progress"><div id="riskBar" style="width: 0%"></div></div>

            <div class="metric"><span>Accident Probability</span><span id="accidentScore">0%</span></div>
            <div class="progress"><div id="accidentBar" style="width: 0%"></div></div>
        </div>
    </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>
<script src="script.js"></script>
</body>
</html>
