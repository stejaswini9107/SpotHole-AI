<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpotHole AI | Professional Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
    <div class="logo">SpotHole <span>AI</span></div>
    <div class="status-indicator">
        <span id="system-status">System: Ready</span>
        <div class="dot"></div>
    </div>
</header>

<div class="layout">
    <div id="map"></div>

    <aside class="sidebar">
        <div class="glass-card">
            <h3>Navigation Setup</h3>
            <div class="search-container">
                <input type="text" id="originInput" placeholder="Enter Origin" autocomplete="off">
                <div id="originSuggestions" class="suggestions-box"></div>
                <div class="btn-group">
                    <button class="btn-secondary" style="width:100%" onclick="useMyLocation()">Use Current Location</button>
                </div>
            </div>

            <div class="search-container">
                <input type="text" id="destinationInput" placeholder="Enter Destination" autocomplete="off">
                <div id="destinationSuggestions" class="suggestions-box"></div>
                <button class="btn-primary full-width" style="width:100%" onclick="drawRoute()">Generate Smart Route</button>
            </div>
        </div>

        <div class="glass-card">
            <h3>AI Vision Feed</h3>
            <div class="video-container">
                <div class="scanner-line"></div>
                <video id="camera" autoplay playsinline muted></video>
            </div>
            <button class="btn-monitor" id="monitorBtn" onclick="startCamera()">Start AI Monitoring</button>
        </div>

        <div class="glass-card detection-status">
            <h3>Live Detection</h3>
            <div class="status-row">
                <span>Surface:</span>
                <span id="currentSurface" class="status-value">Ready</span>
            </div>
            <div class="status-row">
                <span>Confidence:</span>
                <span id="confidenceValue" class="status-value">0%</span>
            </div>
        </div>

        <div class="glass-card analytics">
            <h3>Analytics & Risk</h3>
            <div class="metric"><span>Potholes Found</span><span id="potholeHits" class="neon-text">0</span></div>
            <div class="metric"><span>Road Risk</span><span id="riskScore">0%</span></div>
            <div class="progress"><div id="riskBar"></div></div>
            <div class="metric"><span>Accident Prob.</span><span id="accidentScore">0%</span></div>
            <div class="progress"><div id="accidentBar"></div></div>
            <button class="btn-action" style="margin-top:15px; font-size: 10px; opacity: 0.6;" onclick="clearDatabase()">Reset Data</button>
        </div>
    </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
